{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center text-white bg-info p-5 rounded shadow">
        <h2>Vocabulary Matching Game</h2>
        <p class="lead" id="game-subtitle">Loading your personalised vocabulary game...</p>

        <div class="card mt-4 text-dark text-start shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-4 fw-bold">Score: <span id="score">0</span></span>
                    <span class="fs-5 text-muted">Question: <span id="q-num">1</span>/<span id="total-q">5</span></span>
                </div>

                <h3 class="text-center py-4 bg-light rounded" id="word-display">
                    <span class="spinner-border spinner-border-sm text-primary" role="status"></span> Loading...
                </h3>

                <div class="d-grid gap-2 mt-4" id="options-container"></div>

                <div id="feedback" class="mt-4 text-center fs-5 d-none"></div>
                <div class="text-center mt-3 d-none" id="next-btn-container">
                    <button class="btn btn-success" id="btn-next">Next Word</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentQ = 0;
    let score = 0;
    let questions = [];
    let allMeanings = [];

    const wordDisplay = document.getElementById('word-display');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score');
    const qNumDisplay = document.getElementById('q-num');
    const totalQDisplay = document.getElementById('total-q');
    const feedback = document.getElementById('feedback');
    const nextBtnContainer = document.getElementById('next-btn-container');
    const btnNext = document.getElementById('btn-next');
    const subtitle = document.getElementById('game-subtitle');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getCookie(name) {
        let value = null;
        document.cookie.split(';').forEach(c => {
            const trimmed = c.trim();
            if (trimmed.startsWith(name + '=')) value = decodeURIComponent(trimmed.substring(name.length + 1));
        });
        return value;
    }

    async function markSeen(questionId) {
        try {
            await fetch('/api/mark-seen/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ question_id: questionId })
            });
        } catch (e) { }
    }

    async function initNewGame() {
        wordDisplay.innerHTML = '<span class="spinner-border spinner-border-sm text-primary" role="status"></span> Loading...';
        optionsContainer.innerHTML = '';

        try {
            const resp = await fetch('/api/get-game/vocab/');
            if (!resp.ok) throw new Error('No data');
            const data = await resp.json();
            const items = shuffle(data.items || []);

            allMeanings = items.map(i => i.meaning);

            questions = items.map(pair => {
                const otherMeanings = shuffle(allMeanings.filter(m => m !== pair.meaning)).slice(0, 3);
                return {
                    word: pair.word,
                    correct: pair.meaning,
                    options: shuffle([pair.meaning, ...otherMeanings]),
                    id: pair.id
                };
            });

            subtitle.textContent = data.has_conversation
                ? 'Vocabulary from your AI conversation!'
                : 'Match the word to its correct meaning to earn points.';

        } catch (e) {
            wordDisplay.innerText = 'Error loading game. Please try again.';
            return;
        }

        currentQ = 0;
        score = 0;
        scoreDisplay.innerText = '0';
        totalQDisplay.innerText = questions.length;
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= questions.length) {
            wordDisplay.innerText = 'Level Completed!';
            optionsContainer.innerHTML = `<h4 class="text-center text-success mt-3 mb-4">Final Score: ${score}/${questions.length * 10}</h4>`;
            feedback.classList.add('d-none');
            nextBtnContainer.innerHTML = `<button class="btn btn-primary btn-lg" onclick="initNewGame()">Play Next Level</button>`;
            nextBtnContainer.classList.remove('d-none');
            return;
        }
        const q = questions[currentQ];
        wordDisplay.innerText = q.word;
        qNumDisplay.innerText = currentQ + 1;

        optionsContainer.innerHTML = '';
        shuffle([...q.options]).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary option-btn text-start p-3 fw-medium';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt === q.correct, btn, q.correct, q.id);
            optionsContainer.appendChild(btn);
        });

        feedback.className = 'mt-4 text-center fs-5 d-none';
        nextBtnContainer.classList.add('d-none');
    }

    function checkAnswer(isCorrect, selectedBtn, correctMeaning, questionId) {
        document.querySelectorAll('.option-btn').forEach(b => {
            b.disabled = true;
            if (b.innerText === correctMeaning) {
                b.classList.replace('btn-outline-primary', 'btn-success');
                b.classList.add('text-white');
            }
        });
        feedback.classList.remove('d-none');
        if (isCorrect) {
            feedback.innerHTML = '<strong><i class="bi bi-check-circle-fill"></i> Correct! 🎉</strong>';
            feedback.className = 'mt-4 p-3 rounded bg-success bg-opacity-10 border border-success text-success';
            score += 10;
            scoreDisplay.innerText = score;
        } else {
            selectedBtn.classList.replace('btn-outline-primary', 'btn-danger');
            selectedBtn.classList.add('text-white');
            feedback.innerHTML = '<strong><i class="bi bi-x-circle-fill"></i> Wrong!</strong> The correct answer was: <em>' + correctMeaning + '</em>';
            feedback.className = 'mt-4 p-3 rounded bg-danger bg-opacity-10 border border-danger text-danger';
        }
        nextBtnContainer.classList.remove('d-none');
        if (questionId) markSeen(questionId);
    }

    btnNext.addEventListener('click', () => { currentQ++; loadQuestion(); });

    initNewGame();
</script>
{% endblock %}
