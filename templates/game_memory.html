{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center pb-5">
    <div class="col-md-10 text-center">
        <h2 class="display-5 fw-bold text-primary mb-3">Memory Match: Grammar Edition</h2>
        <p class="lead text-secondary mb-5" id="game-subtitle">Loading your personalised memory game...</p>

        <div class="card glass-card shadow-lg border-0 text-start mx-auto p-4" style="max-width: 900px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-dark">Moves: <span id="moves" class="text-primary">0</span></h5>
                <h5 class="fw-bold m-0 text-dark">Matches: <span id="matches" class="text-success">0</span> / <span
                        id="total-pairs">6</span></h5>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="initGame()">Restart
                    Game</button>
            </div>

            <div class="memory-grid gap-3" id="memory-grid">
                <div class="text-center p-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Generating memory cards...</p>
                </div>
            </div>

            <div id="win-message" class="text-center mt-5 d-none animation-fade-in">
                <i class="bi bi-star-fill text-warning" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-dark mt-3">Incredible! You matched them all!</h3>
                <p class="text-muted">Total Moves: <span id="final-moves"></span></p>
                <button class="btn btn-primary-gradient btn-lg px-5 mt-3 btn-modern" onclick="initGame()">Play Again
                    with New Cards</button>
            </div>
        </div>
    </div>
</div>

<style>
    .memory-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        perspective: 1000px;
    }

    .memory-card {
        aspect-ratio: 1;
        background: transparent;
        border: none;
        cursor: pointer;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.5s ease;
    }

    .memory-card.flipped {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .card-front {
        background: linear-gradient(135deg, #4A90E2, #50E3C2);
        transform: rotateY(180deg);
        color: white;
        font-size: 1.1rem;
    }

    .card-back {
        background: white;
        border: 2px solid #4A90E2;
        color: #4A90E2;
        font-size: 2rem;
    }

    .animation-fade-in {
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    let grid = document.getElementById("memory-grid");
    let movesDisplay = document.getElementById("moves");
    let matchesDisplay = document.getElementById("matches");
    let totalPairsDisplay = document.getElementById("total-pairs");
    let winMessage = document.getElementById("win-message");
    let finalMoves = document.getElementById("final-moves");
    let subtitle = document.getElementById("game-subtitle");

    let hasFlippedCard = false, lockBoard = false;
    let firstCard, secondCard;
    let moves = 0, matches = 0, totalPairs = 6;
    let seenIds = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getCookie(name) {
        let value = null;
        document.cookie.split(';').forEach(c => {
            const t = c.trim();
            if (t.startsWith(name + '=')) value = decodeURIComponent(t.substring(name.length + 1));
        });
        return value;
    }

    async function markSeen(questionId) {
        try {
            await fetch('/api/mark-seen/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ question_id: questionId })
            });
        } catch (e) { }
    }

    async function initGame() {
        grid.innerHTML = '<div class="text-center p-5" style="grid-column: 1/-1;"><div class="spinner-border text-primary" role="status"></div><p class="mt-3 text-muted">Generating memory cards...</p></div>';
        winMessage.classList.add('d-none');
        moves = 0; matches = 0; hasFlippedCard = false; lockBoard = false;
        firstCard = null; secondCard = null; seenIds = [];
        movesDisplay.innerText = moves;
        matchesDisplay.innerText = matches;

        let gameCards = [];
        try {
            const resp = await fetch('/api/get-game/memory/');
            if (!resp.ok) throw new Error('No data');
            const data = await resp.json();
            const items = data.items || [];
            seenIds = items.map(i => i.id).filter((v, i, a) => a.indexOf(v) === i);

            subtitle.textContent = data.has_conversation
                ? 'Cards generated from your AI conversation!'
                : 'Flip the cards and match the English word to its correct synonym or definition.';

            // Group items by their pair id
            // Each pair has "id", "type" A & B
            gameCards = items;
        } catch (e) {
            grid.innerHTML = '<p class="text-center text-muted p-5">Error loading game. Please try again.</p>';
            return;
        }

        // Determine total unique pairs from A cards
        const pairCount = gameCards.filter(c => c.type === 'A').length;
        totalPairs = pairCount;
        totalPairsDisplay.innerText = pairCount;

        gameCards = shuffle(gameCards);
        grid.innerHTML = '';

        gameCards.forEach(cardData => {
            let cardElement = document.createElement("div");
            cardElement.classList.add("memory-card");
            cardElement.dataset.name = cardData.id;
            cardElement.dataset.qid = cardData.id;
            cardElement.innerHTML = `<div class="card-front">${cardData.text}</div><div class="card-back"><i class="bi bi-question-circle"></i></div>`;
            cardElement.addEventListener("click", flipCard);
            grid.appendChild(cardElement);
        });
    }

    function flipCard() {
        if (lockBoard || this === firstCard) return;
        this.classList.add("flipped");
        if (!hasFlippedCard) { hasFlippedCard = true; firstCard = this; return; }
        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        moves++;
        movesDisplay.innerText = moves;
        let isMatch = firstCard.dataset.name === secondCard.dataset.name;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener("click", flipCard);
        secondCard.removeEventListener("click", flipCard);
        firstCard.style.opacity = '0.7';
        secondCard.style.opacity = '0.7';
        matches++;
        matchesDisplay.innerText = matches;
        if (matches === totalPairs) {
            setTimeout(() => {
                grid.innerHTML = "";
                winMessage.classList.remove("d-none");
                finalMoves.innerText = moves;
                // Mark all seen
                seenIds.forEach(id => { if (id) markSeen(id); });
            }, 800);
        }
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");
            resetBoard();
        }, 1200);
    }

    function resetBoard() { [hasFlippedCard, lockBoard] = [false, false];[firstCard, secondCard] = [null, null]; }

    initGame();
</script>
{% endblock %}
