{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9 text-center">
        <h2 class="display-5 fw-bold text-primary mb-3">SpeakSmart Quizzes</h2>
        <p class="lead text-secondary mb-5" id="quiz-subtitle">Loading your personalised quiz...</p>

        <div class="card glass-card shadow-lg border-0 text-start mx-auto" style="max-width: 800px;">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-patch-question me-2"></i>English Proficiency Quiz</h5>
                <span class="badge bg-light text-primary fs-6">Score: <span id="quiz-score">0</span></span>
            </div>
            <div class="card-body p-5" id="quiz-container">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Generating your quiz...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let quizData = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    const quizContainer = document.getElementById('quiz-container');
    const scoreDisplay = document.getElementById('quiz-score');
    const subtitle = document.getElementById('quiz-subtitle');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function markSeen(questionId) {
        try {
            await fetch('/api/mark-seen/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ question_id: questionId })
            });
        } catch (e) { console.log('Mark seen failed:', e); }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function loadQuizData() {
        try {
            const resp = await fetch('/api/get-quiz/');
            if (!resp.ok) throw new Error('No questions');
            const data = await resp.json();
            quizData = shuffle(data.questions || []);
            const hasConversation = data.has_conversation || false;
            subtitle.textContent = hasConversation
                ? 'Questions generated from your AI conversation!'
                : 'Test your grammar and vocabulary knowledge with our interactive quizzes.';
            subtitle.className = 'lead mb-5 ' + (hasConversation ? 'text-success fw-semibold' : 'text-secondary');
        } catch (e) {
            quizData = [];
        }
        renderQuiz();
    }

    function renderQuiz() {
        if (quizData.length === 0) {
            quizContainer.innerHTML = '<div class="text-center py-4 text-muted"><i class="bi bi-exclamation-circle fs-1"></i><p class="mt-3">No questions available right now. Try again later!</p></div>';
            return;
        }
        currentQuestionIndex = 0;
        currentScore = 0;
        scoreDisplay.innerText = '0';
        quizContainer.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="text-muted fw-bold">Question <span id="current-q">1</span> of <span id="total-q">${quizData.length}</span></h5>
            </div>
            <h3 class="mb-4 text-dark" id="question-text"></h3>
            <div class="d-grid gap-3 mt-4" id="answers-container"></div>
            <div id="quiz-feedback" class="mt-4 p-3 rounded d-none"></div>
            <div class="text-end mt-4 d-none" id="next-btn-container">
                <button class="btn btn-primary btn-lg px-5 btn-modern" id="btn-next-quiz">Next Question</button>
            </div>
        `;
        document.getElementById('btn-next-quiz').addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuizQuestion();
        });
        loadQuizQuestion();
    }

    function loadQuizQuestion() {
        if (currentQuestionIndex >= quizData.length) { showResults(); return; }
        const q = quizData[currentQuestionIndex];
        document.getElementById('current-q').innerText = currentQuestionIndex + 1;
        document.getElementById('question-text').innerText = q.question;

        const correctOption = q.options[q.correct];
        const shuffledOptions = shuffle([...q.options]);

        const answersContainer = document.getElementById('answers-container');
        answersContainer.innerHTML = '';
        shuffledOptions.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary btn-lg text-start px-4 option-btn';
            btn.innerHTML = `<span class="fw-bold me-2">${String.fromCharCode(65 + index)}.</span> ${opt}`;
            btn.onclick = () => selectAnswer(opt, correctOption, btn, q.explanation, q.id);
            answersContainer.appendChild(btn);
        });

        document.getElementById('quiz-feedback').classList.add('d-none');
        document.getElementById('next-btn-container').classList.add('d-none');
    }

    function selectAnswer(selectedOpt, correctOpt, selectedBtn, explanation, questionId) {
        const isCorrect = selectedOpt === correctOpt;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = true;
            const btnText = btn.innerText.substring(3).trim();
            if (btnText === correctOpt) {
                btn.classList.replace('btn-outline-primary', 'btn-success');
                btn.classList.add('text-white');
            } else if (btnText === selectedOpt && !isCorrect) {
                btn.classList.replace('btn-outline-primary', 'btn-danger');
                btn.classList.add('text-white');
            }
        });
        const feedbackBox = document.getElementById('quiz-feedback');
        feedbackBox.classList.remove('d-none');
        if (isCorrect) {
            currentScore += 10;
            scoreDisplay.innerText = currentScore;
            feedbackBox.className = 'mt-4 p-3 rounded bg-success bg-opacity-10 border border-success text-success';
            feedbackBox.innerHTML = `<strong><i class="bi bi-check-circle-fill"></i> Excellent!</strong><br><small>${explanation}</small>`;
        } else {
            feedbackBox.className = 'mt-4 p-3 rounded bg-danger bg-opacity-10 border border-danger text-danger';
            feedbackBox.innerHTML = `<strong><i class="bi bi-x-circle-fill"></i> Incorrect</strong><br><small>${explanation}</small>`;
        }
        document.getElementById('next-btn-container').classList.remove('d-none');
        if (questionId) markSeen(questionId);
    }

    function showResults() {
        quizContainer.innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-trophy text-warning" style="font-size: 4rem;"></i>
                <h2 class="mt-4 fw-bold text-dark">Quiz Completed!</h2>
                <h4 class="text-muted mb-4">Your final score: <span class="text-primary">${currentScore}</span> out of ${quizData.length * 10}</h4>
                <button class="btn btn-primary btn-modern px-5" onclick="initNewGame()">Play Next Level</button>
                <a href="/analysis/" class="btn btn-outline-modern btn-modern px-5 ms-3">View Progress</a>
            </div>
        `;
    }

    function initNewGame() {
        quizContainer.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-3 text-muted">Generating your quiz...</p></div>';
        loadQuizData();
    }

    // Start
    loadQuizData();
</script>
{% endblock %}
