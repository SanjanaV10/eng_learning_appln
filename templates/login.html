{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card glass-card shadow-lg border-0 mt-5">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="mb-0 fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i> User Login</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg btn-modern">Login</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="text-secondary">Don't have an account? <a href="{% url 'signup' %}"
                            class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
