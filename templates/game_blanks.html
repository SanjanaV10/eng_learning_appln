{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center text-white bg-success p-5 rounded shadow">
        <h2>Fill in the Blanks</h2>
        <p class="lead">Complete the sentence with the correct grammar or word.</p>

        <div class="card mt-4 text-dark text-start shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-4 fw-bold">Score: <span id="score">0</span></span>
                    <span class="fs-5 text-muted">Question: <span id="q-num">1</span>/5</span>
                </div>

                <h4 class="text-center py-4 bg-light rounded px-3" style="line-height: 1.6;" id="sentence-display">
                    This is a sample sentence with a <span
                        class="bg-warning px-4 py-1 text-transparent rounded border-bottom border-dark border-2">___</span>
                    blank.
                </h4>

                <div class="d-grid gap-2 mt-4" id="options-container">
                    <!-- Options will be here -->
                </div>

                <div id="feedback" class="mt-4 text-center fs-5 d-none"></div>
                <div class="text-center mt-3 d-none" id="next-btn-container">
                    <button class="btn btn-primary" id="btn-next">Next Sentence</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}

        },

            blank: "for",

        },
        {

            options: ["never", "ever", "yet", "still"]

    function shuffleOptions(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let currentQ = 0;
    let score = 0;
    let questions = [];

    const sentenceDisplay = document.getElementById('sentence-display');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score');
    const qNumDisplay = document.getElementById('q-num');
    const feedback = document.getElementById('feedback');
    const nextBtnContainer = document.getElementById('next-btn-container');
    const btnNext = document.getElementById('btn-next');

    // Shuffle array utility
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    // Always pick 5 random questions
    function initNewGame() {
        let askedIndices = JSON.parse(sessionStorage.getItem('blanks_asked_indices') || '[]');

        let availableQuestions = allQuestionsList.map((q, idx) => ({ ...q, originalIndex: idx }))
            .filter(q => !askedIndices.includes(q.originalIndex));

        if (availableQuestions.length < 5) {
            // Not enough left, reset
            askedIndices = [];
            availableQuestions = allQuestionsList.map((q, idx) => ({ ...q, originalIndex: idx }));
        }

        const selectedQuestions = shuffleOptions(availableQuestions).slice(0, 5);

        const newlyAskedIndices = selectedQuestions.map(q => q.originalIndex);
        sessionStorage.setItem('blanks_asked_indices', JSON.stringify([...askedIndices, ...newlyAskedIndices]));

        questions = selectedQuestions;

        currentQ = 0;
        score = 0;
        scoreDisplay.innerText = "0";
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= questions.length) {
            sentenceDisplay.innerHTML = "Level Completed!";
            optionsContainer.innerHTML = `<h4 class="text-center text-success mt-3 mb-4">Final Score: ${score}/${questions.length * 10}</h4>`;
            feedback.classList.add('d-none');
            nextBtnContainer.innerHTML = `<button class="btn btn-primary btn-modern btn-lg px-5 mt-2" onclick="location.reload()">Play Next Level</button>`;
            nextBtnContainer.classList.remove('d-none');
            return;
        }

        const q = questions[currentQ];
        // Render sentence with blank (using q.text since we renamed it from q.sentence)
        const parts = q.text.split('___');
        sentenceDisplay.innerHTML = `${parts[0]} <span class="bg-warning px-4 py-1 ms-1 me-1 rounded border-bottom border-dark border-2" style="color: transparent;">___</span> ${parts[1] || ''}`;

        qNumDisplay.innerText = currentQ + 1;

        const shuffledOptions = shuffleOptions([...q.options]);

        optionsContainer.innerHTML = '';
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-success option-btn p-3 fw-medium';
            btn.innerText = opt;
            // pass q.blank instead of q.correct and q.text instead of q.sentence
            btn.onclick = () => checkAnswer(opt, q.blank, btn, q.text);
            optionsContainer.appendChild(btn);
        });

        feedback.className = 'mt-4 text-center fs-5 d-none';
        nextBtnContainer.classList.add('d-none');
    }

    function checkAnswer(selectedOpt, correctOpt, selectedBtn, fullSentence) {
        // Disable all buttons and highlight correct one
        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach(b => {
            b.disabled = true;
            if (b.innerText === correctOpt) {
                b.classList.replace('btn-outline-success', 'btn-success');
                b.classList.add('text-white');
            }
        });

        // Fill the blank
        const parts = fullSentence.split('___');
        const isCorrect = selectedOpt === correctOpt;

        sentenceDisplay.innerHTML = `${parts[0]} <span class="bg-${isCorrect ? 'success' : 'danger'} text-white px-3 py-1 ms-1 me-1 rounded fw-bold">${selectedOpt}</span> ${parts[1] || ''}`;

        feedback.classList.remove('d-none');
        if (isCorrect) {
            feedback.innerHTML = '<strong><i class="bi bi-check-circle-fill"></i> Correct! Outstanding! 🌟</strong>';
            feedback.className = 'mt-4 p-3 rounded bg-success bg-opacity-10 border border-success text-success fw-bold';
            score += 10;
            scoreDisplay.innerText = score;
        } else {
            selectedBtn.classList.replace('btn-outline-success', 'btn-danger');
            selectedBtn.classList.add('text-white');
            feedback.innerHTML = '<strong><i class="bi bi-x-circle-fill"></i> Oops!</strong> The correct word is: <em>' + correctOpt + '</em>';
            feedback.className = 'mt-4 p-3 rounded bg-danger bg-opacity-10 border border-danger text-danger fw-bold';
        }

        nextBtnContainer.classList.remove('d-none');
    }

    btnNext.addEventListener('click', () => {
        currentQ++;
        loadQuestion();
    });

    // Initialize game
    initNewGame();
