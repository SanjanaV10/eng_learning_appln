{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center text-white bg-success p-5 rounded shadow">
        <h2>Fill in the Blanks</h2>
        <p class="lead" id="game-subtitle">Loading your personalised game...</p>

        <div class="card mt-4 text-dark text-start shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-4 fw-bold">Score: <span id="score">0</span></span>
                    <span class="fs-5 text-muted">Question: <span id="q-num">1</span>/<span id="total-q">5</span></span>
                </div>

                <h4 class="text-center py-4 bg-light rounded px-3" style="line-height:1.6;" id="sentence-display">
                    <span class="spinner-border spinner-border-sm text-primary" role="status"></span> Loading...
                </h4>

                <div class="d-grid gap-2 mt-4" id="options-container"></div>

                <div id="feedback" class="mt-4 text-center fs-5 d-none"></div>
                <div class="text-center mt-3 d-none" id="next-btn-container">
                    <button class="btn btn-primary" id="btn-next">Next Sentence</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentQ = 0;
    let score = 0;
    let questions = [];

    const sentenceDisplay = document.getElementById('sentence-display');
    const optionsContainer = document.getElementById('options-container');
    const scoreDisplay = document.getElementById('score');
    const qNumDisplay = document.getElementById('q-num');
    const totalQDisplay = document.getElementById('total-q');
    const feedback = document.getElementById('feedback');
    const nextBtnContainer = document.getElementById('next-btn-container');
    const btnNext = document.getElementById('btn-next');
    const subtitle = document.getElementById('game-subtitle');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getCookie(name) {
        let value = null;
        document.cookie.split(';').forEach(c => {
            const t = c.trim();
            if (t.startsWith(name + '=')) value = decodeURIComponent(t.substring(name.length + 1));
        });
        return value;
    }

    async function markSeen(questionId) {
        try {
            await fetch('/api/mark-seen/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ question_id: questionId })
            });
        } catch (e) { }
    }

    async function initNewGame() {
        sentenceDisplay.innerHTML = '<span class="spinner-border spinner-border-sm text-primary" role="status"></span> Loading...';
        optionsContainer.innerHTML = '';

        try {
            const resp = await fetch('/api/get-game/blanks/');
            if (!resp.ok) throw new Error('No data');
            const data = await resp.json();
            questions = shuffle(data.items || []);

            subtitle.textContent = data.has_conversation
                ? 'Sentences generated from your AI conversation!'
                : 'Complete the sentence with the correct grammar or word.';

        } catch (e) {
            sentenceDisplay.innerText = 'Error loading game. Please try again.';
            return;
        }

        currentQ = 0;
        score = 0;
        scoreDisplay.innerText = '0';
        totalQDisplay.innerText = questions.length;
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= questions.length) {
            sentenceDisplay.innerHTML = 'Level Completed!';
            optionsContainer.innerHTML = `<h4 class="text-center text-success mt-3 mb-4">Final Score: ${score}/${questions.length * 10}</h4>`;
            feedback.classList.add('d-none');
            nextBtnContainer.innerHTML = `<button class="btn btn-primary btn-modern btn-lg px-5 mt-2" onclick="initNewGame()">Play Next Level</button>`;
            nextBtnContainer.classList.remove('d-none');
            return;
        }

        const q = questions[currentQ];
        const parts = q.text.split('___');
        sentenceDisplay.innerHTML = `${parts[0]} <span class="bg-warning px-4 py-1 ms-1 me-1 rounded border-bottom border-dark border-2" style="color:transparent;">___</span> ${parts[1] || ''}`;
        qNumDisplay.innerText = currentQ + 1;

        optionsContainer.innerHTML = '';
        shuffle([...q.options]).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-success option-btn p-3 fw-medium';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, q.blank, btn, q.text, q.id);
            optionsContainer.appendChild(btn);
        });

        feedback.className = 'mt-4 text-center fs-5 d-none';
        nextBtnContainer.classList.add('d-none');
    }

    function checkAnswer(selectedOpt, correctOpt, selectedBtn, fullSentence, questionId) {
        document.querySelectorAll('.option-btn').forEach(b => {
            b.disabled = true;
            if (b.innerText === correctOpt) {
                b.classList.replace('btn-outline-success', 'btn-success');
                b.classList.add('text-white');
            }
        });

        const parts = fullSentence.split('___');
        const isCorrect = selectedOpt === correctOpt;
        sentenceDisplay.innerHTML = `${parts[0]} <span class="bg-${isCorrect ? 'success' : 'danger'} text-white px-3 py-1 ms-1 me-1 rounded fw-bold">${selectedOpt}</span> ${parts[1] || ''}`;

        feedback.classList.remove('d-none');
        if (isCorrect) {
            feedback.innerHTML = '<strong><i class="bi bi-check-circle-fill"></i> Correct! Outstanding! 🌟</strong>';
            feedback.className = 'mt-4 p-3 rounded bg-success bg-opacity-10 border border-success text-success fw-bold';
            score += 10;
            scoreDisplay.innerText = score;
        } else {
            selectedBtn.classList.replace('btn-outline-success', 'btn-danger');
            selectedBtn.classList.add('text-white');
            feedback.innerHTML = '<strong><i class="bi bi-x-circle-fill"></i> Oops!</strong> The correct word is: <em>' + correctOpt + '</em>';
            feedback.className = 'mt-4 p-3 rounded bg-danger bg-opacity-10 border border-danger text-danger fw-bold';
        }
        nextBtnContainer.classList.remove('d-none');
        if (questionId) markSeen(questionId);
    }

    btnNext.addEventListener('click', () => { currentQ++; loadQuestion(); });

    initNewGame();
</script>
{% endblock %}
